name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/cbsa-backend:${{ github.sha }},${{ secrets.REGISTRY_LOGIN_SERVER }}/cbsa-backend:latest

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.REGISTRY_LOGIN_SERVER }}/cbsa-backend:${{ github.sha }}

  build-and-deploy-gat:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push GAT service Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./gat-service
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/cbsa-gat-service:${{ github.sha }},${{ secrets.REGISTRY_LOGIN_SERVER }}/cbsa-gat-service:latest

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Azure App Service for GAT (if not exists)
        run: |
          if az webapp show --name "${{ secrets.AZURE_GAT_WEBAPP_NAME }}" --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" > /dev/null 2>&1; then
            echo "App Service ${{ secrets.AZURE_GAT_WEBAPP_NAME }} already exists, skipping creation."
          else
            echo "App Service ${{ secrets.AZURE_GAT_WEBAPP_NAME }} not found. Creating..."
            az webapp create \
              --name "${{ secrets.AZURE_GAT_WEBAPP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --plan "${{ secrets.AZURE_APP_SERVICE_PLAN }}" \
              --deployment-container-image-name "${{ secrets.REGISTRY_LOGIN_SERVER }}/cbsa-gat-service:${{ github.sha }}"
          fi

      - name: Deploy GAT service to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_GAT_WEBAPP_NAME }}
          images: ${{ secrets.REGISTRY_LOGIN_SERVER }}/cbsa-gat-service:${{ github.sha }}

